name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  MODULE_ID: duck-toolbox
  ANDROID_API_LEVEL: 21
  TARGET: aarch64-linux-android

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 45


    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r29
          add-to-path: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.TARGET }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build Android backend binary
        working-directory: duckd
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          CC_aarch64_linux_android: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/${{ env.TARGET }}${{ env.ANDROID_API_LEVEL }}-clang
          CXX_aarch64_linux_android: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/${{ env.TARGET }}${{ env.ANDROID_API_LEVEL }}-clang++
          AR_aarch64_linux_android: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar
        run: CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$CC_aarch64_linux_android cargo build --locked --release --target ${{ env.TARGET }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: ui
        run: pnpm install --frozen-lockfile

      - name: Build WebUI
        working-directory: ui
        run: pnpm build

      - name: Verify module file line endings
        working-directory: module
        run: |
          if grep -n $'\r' module.prop customize.sh service.sh bin/duckctl.sh >/dev/null; then
            echo "KernelSU module metadata and shell scripts must use LF line endings." >&2
            exit 1
          fi

      - name: Assemble module archive
        run: |
          version="$(grep '^version=' module/module.prop | cut -d= -f2)"

          cp README.md module/
          cp duckd/target/${{ env.TARGET }}/release/duckd module/bin/duckd

          archive="dist/${{ env.MODULE_ID }}-${version}.zip"
          echo "MODULE_PATH=$archive" >> $GITHUB_ENV
          mkdir -p dist
          cd module
          zip -r "../$archive" .

      - name: Upload module artifact
        uses: actions/upload-artifact@v4
        with:
          name: module-zip
          path: ${{ env.MODULE_PATH }}


